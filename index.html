<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Do'h - Spark an argument.</title>
    <!-- Use a brutalist font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <!-- Umami Analytics -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="cf4d5d45-9871-450d-ac00-f410a6b3c47f"></script>
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <h1 class="logo">Do'h</h1>
        <!-- v2 Feature -->
        <button id="btn-submit-topic" class="btn btn-secondary">Submit Topic</button>
      </header>

      <main class="main-content">
        <div class="filters">
          <div class="filter-group">
            <label class="filter-label">BATTLEGROUND</label>
            <div class="checkbox-group" id="category-checkboxes">
              <label><input type="checkbox" value="science" class="brutalist-checkbox" checked> SCIENCE</label>
              <label><input type="checkbox" value="technology" class="brutalist-checkbox" checked> TECHNOLOGY</label>
              <label><input type="checkbox" value="philosophy" class="brutalist-checkbox" checked> PHILOSOPHY</label>
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">MEMORY</label>
            <div class="checkbox-group">
              <label><input type="checkbox" id="exclude-seen-checkbox" class="brutalist-checkbox"> EXCLUDE SEEN</label>
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">SPECIAL</label>
            <div class="checkbox-group">
              <label><input type="checkbox" id="myth-only-checkbox" class="brutalist-checkbox"> BUST THIS MYTH!</label>
            </div>
          </div>
        </div>

        <div class="card-section">
          <div class="topic-card" id="topic-card">
            <div class="tag-container">
              <span class="tag" id="topic-category">SYSTEM</span>
            </div>
            <h2 class="topic-text" id="topic-text">Select your flavor of discourse below.</h2>
            <div class="watermark" id="watermark">
              <h1 class="logo" style="font-size: 2rem;">Do'h</h1>
            </div>
          </div>
          
          <div class="share-actions">
            <button id="btn-copy-image" class="btn-icon" aria-label="Copy as Image" title="Copy as Image">📸 COPY AS IMAGE</button>
          </div>
        </div>
        
        <div class="controls-section">
          <div class="mode-toggle">
            <label class="toggle-label">
              <input type="radio" name="mode" value="nice" checked>
              CIVIL DISCUSSION
            </label>
            <label class="toggle-label">
              <input type="radio" name="mode" value="violence">
              CHOOSE VIOLENCE
            </label>
          </div>
          
          <div class="action-buttons">
            <button id="btn-spin" class="btn btn-primary">SUGGEST TOPIC</button>
          </div>
        </div>
      </main>

      <footer class="footer">
        <p>Spark an argument. Realize you’re wrong. Say the word.</p>
      </footer>
    </div>

    <!-- Modal for submitting -->
    <dialog id="submit-modal" class="modal">
      <div class="modal-content">
        <h3>Submit a new Topic</h3>
        <form id="submit-form">
          <div class="input-group">
            <label for="new-category" class="filter-label">CATEGORY</label>
            <select id="new-category" name="category" class="brutalist-select" required>
              <option value="Science">SCIENCE</option>
              <option value="Technology">TECHNOLOGY</option>
              <option value="Philosophy">PHILOSOPHY</option>
            </select>
          </div>
          <div class="input-group">
            <label for="new-topic">Topic / Argument</label>
            <textarea id="new-topic" name="topic" rows="4" placeholder="e.g. Virtual reality will eventually replace physical travel." required></textarea>
            <small class="callout">Have more than one idea? You are encouraged to submit multiple! Just separate them with a line break.</small>
          </div>
          <div class="modal-actions">
            <button type="button" id="btn-close-modal" class="btn btn-secondary">Cancel</button>
            <button type="submit" class="btn btn-primary">Submit for Review</button>
          </div>
        </form>
      </div>
    </dialog>

    <script type="module" src="/main.js"></script>
  </body>
</html>
